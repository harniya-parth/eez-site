<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/eez-logo-icon.webp" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/eez-logo-icon.webp" />
  <link rel="manifest" href="/manifest.json" />

  <!-- Preconnect: establish connections before browser needs them -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- DNS prefetch for external services used later -->
  <link rel="dns-prefetch" href="https://wa.me" />
  <link rel="dns-prefetch" href="https://script.google.com" />
  <link rel="dns-prefetch" href="https://www.google.com" />

  <!-- Preload critical font (Syne 800 is your hero title font — loads first) -->
  <link rel="preload" as="style"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" />
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap"
    media="print" onload="this.media='all'" />
  <!-- Fallback for no-JS -->
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" />
  </noscript>

  <!-- Preload your logo — it's above the fold, LCP element -->
  <link rel="preload" as="image" href="/eez-logo.png" />

  <!-- Primary SEO -->
  <title>Excellent Education Zone – Best Coaching in Ahmedabad</title>
  <meta name="description"
    content="Excellent Education Zone offers expert Maths, Science, Commerce & English coaching for Class 9th–12th in Ranip, Ahmedabad. 98% results, small batches, experienced faculty." />
  <meta name="keywords"
    content="coaching classes Ahmedabad, tuition Ranip, class 10 coaching, class 12 commerce, maths tuition Ahmedabad, EEZ" />
  <meta name="author" content="Excellent Education Zone" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://excellenteducationzone.vercel.app/" />

  <!-- Open Graph -->
  <meta property="og:site_name" content="Excellent Education Zone" />
  <meta property="og:title" content="Excellent Education Zone – Best Coaching in Ahmedabad" />
  <meta property="og:description"
    content="Top-rated coaching for Class 9–12 in Ranip, Ahmedabad. Expert faculty in Maths, Science, Commerce & English. Small batches & 98% results guaranteed." />
  <meta property="og:url" content="https://excellenteducationzone.vercel.app/" />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://excellenteducationzone.vercel.app/eez-banner.webp" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />

  <!-- Twitter Card (works on WhatsApp share previews too) -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Excellent Education Zone – Best Coaching in Ahmedabad" />
  <meta name="twitter:description"
    content="Top-rated coaching for Class 9–12 in Ranip, Ahmedabad. 98% results guaranteed." />
  <meta name="twitter:image" content="https://excellenteducationzone.vercel.app/eez-banner.webp" />

  <!-- Theme color — matches your navy, shows in Chrome mobile address bar -->
  <meta name="theme-color" content="#050d1f" />

  <!-- Schema Markup -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "EducationalOrganization",
    "name": "Excellent Education Zone",
    "url": "https://excellenteducationzone.vercel.app",
    "logo": "https://excellenteducationzone.vercel.app/eez-logo-icon.webp",
    "description": "Top coaching institute in Ranip, Ahmedabad for Class 9th to 12th students.",
    "address": {
      "@type": "PostalAddress",
      "streetAddress": "Opposite New Corporation Office, Near Gayatri Bus Stop",
      "addressLocality": "Ranip, Ahmedabad",
      "addressCountry": "IN"
    },
    "telephone": "+916353717551",
    "email": "info@excellenteducationzone.com"
  }
  </script>

  <!-- Inline critical CSS — paint navbar + hero background instantly before JS loads -->
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth;
      font-size: 16px
    }

    body {
      background: #050d1f;
      color: #fff;
      overflow-x: hidden;
      font-family: 'DM Sans', system-ui, sans-serif
    }

    #root {
      min-height: 100vh
    }

    /* Prevent layout shift while React hydrates */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      padding: 20px 0
    }

    .hero {
      min-height: 100vh;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, #0d2259 0%, #050d1f 70%)
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
